# render.yaml — Deploy to Render.com with one click
# https://dashboard.render.com/select-repo

services:
  - type: web
    name: quickcommerce-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # free tier — upgrade if traffic grows
    envVars:
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true
